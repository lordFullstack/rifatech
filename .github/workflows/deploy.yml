# ═══════════════════════════════════════════════════════════
#  WORKFLOW 1: Deploy a GitHub Pages
#  Se activa: cada push a main
#  Resultado: sitio publicado en https://tuusuario.github.io/rifatech/
# ═══════════════════════════════════════════════════════════

name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:           # Permite ejecutar manualmente desde la UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true    # Si hay dos deploys seguidos, cancela el anterior

jobs:

  # ─────────────────────────────────────────────────────────
  # JOB 1: Validar HTML antes de publicar
  # ─────────────────────────────────────────────────────────
  validate:
    name: ✅ Validar archivos
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que los archivos clave existen
        run: |
          echo "Verificando estructura del proyecto..."
          test -f index.html        && echo "✓ index.html"        || (echo "✗ Falta index.html" && exit 1)
          test -f organizador.html  && echo "✓ organizador.html"  || (echo "✗ Falta organizador.html" && exit 1)
          test -f styles.css        && echo "✓ styles.css"        || (echo "✗ Falta styles.css" && exit 1)
          test -f app.js            && echo "✓ app.js"            || (echo "✗ Falta app.js" && exit 1)
          echo "✓ Todos los archivos clave presentes"

      - name: Verificar sintaxis JS básica
        run: |
          node --check app.js && echo "✓ app.js sintaxis OK"

  # ─────────────────────────────────────────────────────────
  # JOB 2: Build (inyectar variables de entorno en el HTML)
  # ─────────────────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inyectar URL de Supabase en app.js y organizador.html
        # Reemplaza los placeholders con las variables del repo
        # Configura estas en: Settings → Secrets and variables → Actions
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -n "$SUPABASE_URL" ]; then
            sed -i "s|__SUPABASE_URL__|$SUPABASE_URL|g" app.js organizador.html
            sed -i "s|__SUPABASE_ANON_KEY__|$SUPABASE_ANON_KEY|g" app.js organizador.html
            echo "✓ Variables de Supabase inyectadas"
          else
            echo "⚠ SUPABASE_URL no configurada — usando modo demo (localStorage)"
          fi

      - name: Crear _config.yml para GitHub Pages
        run: |
          cat > _config.yml << 'EOF'
          # GitHub Pages config
          # Permite que los archivos con _ en el nombre sean servidos
          include:
            - _config.yml
          EOF

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'            # Sube todo el directorio raíz

  # ─────────────────────────────────────────────────────────
  # JOB 3: Deploy a Pages
  # ─────────────────────────────────────────────────────────
  deploy:
    name: 🌐 Publicar en GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Mostrar URL publicada
        run: |
          echo "═══════════════════════════════════════"
          echo "  ✅ Sitio publicado exitosamente"
          echo "  🌐 URL: ${{ steps.deployment.outputs.page_url }}"
          echo "  🎟 Comprador:     ${{ steps.deployment.outputs.page_url }}index.html"
          echo "  📊 Organizador:  ${{ steps.deployment.outputs.page_url }}organizador.html"
          echo "═══════════════════════════════════════"
